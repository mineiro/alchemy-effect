<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Chat</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .container {
        width: 100%;
        max-width: 560px;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        height: 90vh;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #94a3b8;
      }
      #status {
        font-size: 0.8rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        display: inline-block;
        align-self: flex-start;
      }
      #status.connected {
        background: #065f46;
        color: #6ee7b7;
      }
      #status.disconnected {
        background: #7f1d1d;
        color: #fca5a5;
      }
      #status.connecting {
        background: #78350f;
        color: #fcd34d;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        background: #1e293b;
        border-radius: 0.5rem;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        font-size: 0.9rem;
        font-family: "SF Mono", "Fira Code", monospace;
      }
      .msg {
        padding: 0.25rem 0;
        border-bottom: 1px solid #334155;
        word-break: break-word;
      }
      .msg.system {
        color: #64748b;
        font-style: italic;
      }
      #form {
        display: flex;
        gap: 0.5rem;
      }
      #input {
        flex: 1;
        padding: 0.6rem 0.75rem;
        border-radius: 0.375rem;
        border: 1px solid #334155;
        background: #1e293b;
        color: #e2e8f0;
        font-size: 0.9rem;
        outline: none;
      }
      #input:focus {
        border-color: #3b82f6;
      }
      button {
        padding: 0.6rem 1.25rem;
        border-radius: 0.375rem;
        border: none;
        background: #3b82f6;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.9rem;
      }
      button:hover {
        background: #2563eb;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #toggle {
        background: #dc2626;
        font-size: 0.8rem;
        padding: 0.35rem 0.75rem;
      }
      #toggle:hover {
        background: #b91c1c;
      }
      #toggle.off {
        background: #16a34a;
      }
      #toggle.off:hover {
        background: #15803d;
      }
      #actions {
        display: flex;
        gap: 0.5rem;
      }
      #increment {
        background: #7c3aed;
      }
      #increment:hover {
        background: #6d28d9;
      }
      #increment:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #workflow-run {
        background: #0ea5e9;
      }
      #workflow-run:hover {
        background: #0284c7;
      }
      #workflow-run:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #workflow-panel {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.75rem;
        background: #1e293b;
        border-radius: 0.5rem;
        border: 1px solid #334155;
      }
      #workflow-panel h2 {
        font-size: 0.75rem;
        font-weight: 600;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #workflow-status {
        font-size: 0.75rem;
        font-family: "SF Mono", "Fira Code", monospace;
        color: #cbd5e1;
        white-space: pre-wrap;
        word-break: break-word;
        min-height: 2.5rem;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Room Chat</h1>
        <button id="toggle">Disconnect</button>
      </div>
      <span id="status" class="disconnected">disconnected</span>
      <div id="messages"></div>
      <div id="actions">
        <button id="increment">Increment Counter</button>
      </div>
      <div id="workflow-panel">
        <h2>NotifyWorkflow</h2>
        <button id="workflow-run" type="button">
          Run workflow (broadcasts to this room)
        </button>
        <div id="workflow-status">Idle — messages will appear in the chat above.</div>
      </div>
      <form id="form">
        <input
          id="input"
          type="text"
          placeholder="Type a message…"
          autocomplete="off"
        />
        <button type="submit">Send</button>
      </form>
    </div>

    <script>
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      const BASE = `${proto}//${location.host}`;
      const roomId =
        new URLSearchParams(location.search).get("room") || "default";

      const statusEl = document.getElementById("status");
      const messagesEl = document.getElementById("messages");
      const form = document.getElementById("form");
      const input = document.getElementById("input");

      function setStatus(s) {
        statusEl.textContent = s;
        statusEl.className = s;
      }

      function addMessage(text, system = false) {
        const div = document.createElement("div");
        div.className = "msg" + (system ? " system" : "");
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      const toggleBtn = document.getElementById("toggle");
      let ws;
      let autoReconnect = true;
      let reconnectTimer;

      function connect() {
        setStatus("connecting");
        addMessage(`Connecting to room "${roomId}"…`, true);

        ws = new WebSocket(`${BASE}/room/${roomId}`);

        ws.addEventListener("open", () => {
          setStatus("connected");
          addMessage("Connected.", true);
        });

        ws.addEventListener("message", (e) => {
          addMessage(e.data);
        });

        ws.addEventListener("close", (e) => {
          setStatus("disconnected");
          addMessage(`Disconnected (code ${e.code}).`, true);
          if (autoReconnect) {
            reconnectTimer = setTimeout(connect, 2000);
          }
        });

        ws.addEventListener("error", () => {
          setStatus("disconnected");
          addMessage("WebSocket error.", true);
        });
      }

      toggleBtn.addEventListener("click", () => {
        if (autoReconnect) {
          autoReconnect = false;
          toggleBtn.textContent = "Connect";
          toggleBtn.className = "off";
          clearTimeout(reconnectTimer);
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close();
          }
        } else {
          autoReconnect = true;
          toggleBtn.textContent = "Disconnect";
          toggleBtn.className = "";
          if (!ws || ws.readyState !== WebSocket.OPEN) {
            connect();
          }
        }
      });

      const incrementBtn = document.getElementById("increment");
      incrementBtn.addEventListener("click", async () => {
        incrementBtn.disabled = true;
        incrementBtn.textContent = "Incrementing…";
        try {
          const resp = await fetch("/sandbox/increment", { method: "POST" });
          const data = await resp.json();
          addMessage(`Counter incremented to ${data.counter}`, true);
        } catch (err) {
          addMessage(`Increment failed: ${err.message}`, true);
        } finally {
          incrementBtn.disabled = false;
          incrementBtn.textContent = "Increment Counter";
        }
      });

      const workflowRunBtn = document.getElementById("workflow-run");
      const workflowStatusEl = document.getElementById("workflow-status");

      function isWorkflowTerminal(status) {
        if (!status || typeof status.status !== "string") return false;
        const s = status.status.toLowerCase();
        return (
          s === "complete" ||
          s === "completed" ||
          s === "errored" ||
          s === "failed" ||
          s === "terminated" ||
          s === "canceled" ||
          s === "cancelled" ||
          (status.error != null && status.error !== undefined)
        );
      }

      function formatWorkflowStatus(status) {
        const lines = [
          `status: ${status.status ?? "(none)"}`,
          status.output !== undefined
            ? `output: ${JSON.stringify(status.output)}`
            : null,
          status.error
            ? `error: ${JSON.stringify(status.error)}`
            : null,
        ].filter(Boolean);
        return lines.join("\n");
      }

      let workflowPollTimer = null;

      workflowRunBtn.addEventListener("click", async () => {
        if (workflowPollTimer) {
          clearTimeout(workflowPollTimer);
          workflowPollTimer = null;
        }
        workflowRunBtn.disabled = true;
        workflowStatusEl.textContent = "Starting workflow…";
        addMessage(
          `Starting NotifyWorkflow for room "${roomId}" (watch for [workflow] lines)…`,
          true,
        );
        try {
          const startResp = await fetch(
            `/workflow/start/${encodeURIComponent(roomId)}`,
            { method: "POST" },
          );
          if (!startResp.ok) {
            const errText = await startResp.text();
            throw new Error(errText || `HTTP ${startResp.status}`);
          }
          const { instanceId } = await startResp.json();
          if (!instanceId) {
            throw new Error("No instanceId in response");
          }
          workflowStatusEl.textContent = `instance: ${instanceId}\npolling…`;

          let pollCount = 0;
          const maxPolls = 120;

          const poll = async () => {
            try {
              pollCount += 1;
              if (pollCount > maxPolls) {
                workflowStatusEl.textContent =
                  `instance: ${instanceId}\n(stopped polling after ${maxPolls} attempts — check logs)`;
                workflowRunBtn.disabled = false;
                addMessage("Workflow status polling timed out.", true);
                return;
              }
              const stResp = await fetch(
                `/workflow/status/${encodeURIComponent(instanceId)}`,
              );
              if (!stResp.ok) {
                workflowStatusEl.textContent = `status fetch failed: HTTP ${stResp.status}`;
                workflowRunBtn.disabled = false;
                return;
              }
              const st = await stResp.json();
              workflowStatusEl.textContent =
                `instance: ${instanceId}\n` + formatWorkflowStatus(st);
              if (isWorkflowTerminal(st)) {
                workflowRunBtn.disabled = false;
                addMessage(
                  `Workflow finished: ${st.status}` +
                    (st.output !== undefined
                      ? ` — ${JSON.stringify(st.output)}`
                      : ""),
                  true,
                );
                return;
              }
              workflowPollTimer = setTimeout(poll, 600);
            } catch (e) {
              workflowStatusEl.textContent = `poll error: ${e.message}`;
              workflowRunBtn.disabled = false;
            }
          };
          await poll();
        } catch (err) {
          workflowStatusEl.textContent = `Error: ${err.message}`;
          addMessage(`Workflow start failed: ${err.message}`, true);
          workflowRunBtn.disabled = false;
        }
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(text);
        input.value = "";
      });

      connect();
    </script>
  </body>
</html>
